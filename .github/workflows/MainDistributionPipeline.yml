name: Main Extension Distribution Pipeline
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  # 1. Dynamically builds both v1.4 and v1.5 in parallel
  duckdb-stable-build:
    name: Build extension binaries (${{ matrix.duckdb_version }})
    strategy:
      matrix:
        duckdb_version: [v1.4-andium, v1.5-variegata]
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@main
    with:
      duckdb_version: ${{ matrix.duckdb_version }}
      ci_tools_version: ${{ matrix.duckdb_version }}
      extension_name: adbc
      skip_tests: true

  code-quality-check:
    name: Code Quality Check
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_code_quality.yml@v1.5-variegata
    with:
      duckdb_version: v1.5-variegata
      ci_tools_version: v1.5-variegata
      extension_name: adbc
      format_checks: 'format;tidy'

  # 2. Runs tests immediately in parallel
  test:
    name: Test ${{ matrix.duckdb_version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        duckdb_version: [v1.4-andium, v1.5-variegata]
        include:
          - os: ubuntu-latest
            arch: linux_amd64
          - os: macos-latest
            arch: osx_arm64
          - os: windows-latest
            arch: windows_amd64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Install dbc (Linux)
        if: runner.os == 'Linux'
        run: curl -LsSf https://dbc.columnar.tech/install.sh | sh

      - name: Install dbc (macOS)
        if: runner.os == 'macOS'
        run: curl -LsSf https://dbc.columnar.tech/install.sh | sh

      - name: Install dbc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Set-ExecutionPolicy Bypass -Scope Process -Force; iex ((New-Object System.Net.WebClient).DownloadString('https://dbc.columnar.tech/install.ps1'))

      - name: Install ADBC drivers
        shell: bash
        run: |
          dbc install duckdb
          dbc install sqlite

      - name: Build
        shell: bash
        env:
          DUCKDB_VERSION: ${{ matrix.duckdb_version }}
        run: GEN=ninja make release test

  # 3. Dynamically deploys both versions, ONLY if builds and tests pass
  deploy:
    name: Deploy extension binaries (${{ matrix.duckdb_version }})
    needs: [duckdb-stable-build, test]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        duckdb_version: [v1.4-andium, v1.5-variegata]
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_deploy.yml@main
    secrets: inherit
    with:
      duckdb_version: ${{ matrix.duckdb_version }}
      ci_tools_version: ${{ matrix.duckdb_version }}
      extension_name: adbc
