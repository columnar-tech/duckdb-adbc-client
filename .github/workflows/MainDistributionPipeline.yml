name: Extension Distribution Pipeline (v1.4)
on:
  push:
    branches:
      - v1.4
  pull_request:
    branches:
      - v1.4
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/v1.4' && github.sha || '' }}
  cancel-in-progress: true
jobs:
  duckdb-build-v1-4:
    name: Build extension binaries (v1.4)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.4-andium
    with:
      duckdb_version: v1.4-andium
      ci_tools_version: v1.4-andium
      extension_name: adbc
      skip_tests: true

  code-quality-check:
    name: Code Quality Check
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_code_quality.yml@v1.4-andium
    with:
      duckdb_version: v1.4-andium
      ci_tools_version: v1.4-andium
      extension_name: adbc
      format_checks: 'format;tidy'

  test:
    name: Test v1.4-andium on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            arch: linux_amd64
          - os: macos-latest
            arch: osx_arm64
          - os: windows-latest
            arch: windows_amd64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'
      - uses: columnar-tech/setup-dbc@v1
      - name: Install ADBC Drivers
        run: |
          dbc install sqlite
          dbc install datafusion
      - name: Build
        shell: bash
        env:
          DUCKDB_VERSION: v1.4-andium
        run: GEN=ninja make release
      - name: Run tests (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: GEN=ninja make test
      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & .\build\release\test\unittest.exe test\

  deploy-v1-4:
    name: Deploy extension binaries (v1.4)
    needs: [duckdb-build-v1-4, test]
    if: github.ref == 'refs/heads/v1.4' || github.event_name == 'workflow_dispatch'
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_deploy.yml@v1.4-andium
    secrets: inherit
    with:
      duckdb_version: v1.4-andium
      ci_tools_version: v1.4-andium
      extension_name: adbc
